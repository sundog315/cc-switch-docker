version: "3.7"

services:
  cc-switch-webtop:
    build: .
    image: cc-switch-webtop:local
    container_name: cc-switch
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - PASSWORD=changeme                  # Web desktop login — CHANGE THIS
      - WEBKIT_DISABLE_COMPOSITING_MODE=1  # WebKit rendering in container
    volumes:
      - ./cc-switch-data:/config           # Persist cc-switch config & keys
    ports:
      - "3000:3000"    # HTTP  web desktop (localhost only — see Security Notes)
      - "3001:3001"    # HTTPS web desktop (remote access via https://<IP>:3001)
      - "15721:15721"  # cc-switch LLM proxy (internal network)
    shm_size: "1gb"
    restart: unless-stopped
